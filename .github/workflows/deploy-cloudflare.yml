name: Deploy Cloudflare Pages with Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and build
        run: |
          pnpm ts-check
          pnpm lint
          pnpm build

      - name: Create Pages project when needed
        env:
          PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          PROJECT_NAME="${PAGES_PROJECT:-corn-pest-detection}"
          if ! pnpm wrangler pages project list | grep -Fq "$PROJECT_NAME"; then
            pnpm wrangler pages project create "$PROJECT_NAME" --production-branch main
          fi

      - name: Deploy Pages and Functions
        env:
          PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: pnpm wrangler pages deploy out --project-name "${PAGES_PROJECT:-corn-pest-detection}" --branch main
